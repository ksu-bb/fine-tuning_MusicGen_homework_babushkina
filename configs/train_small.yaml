# @package _global_
defaults:
  - /conditioner: musicgen_32khz
  - /dataset: music
  - /model: musicgen_small
  - _self_

device: cuda
dtype: float16

conditioner:
  text:
    model: t5
    t5_model_name: google/t5-v1_1-base
    text_fields:
      - description
      - general_mood
      - genre_tags
      - lead_instrument
      - accompaniment
      - tempo_and_rhythm
      - vocal_presence
      - production_quality
    merge_text_p: 0.5          
    drop_desc_p: 0.1           
    drop_other_p: 0.1          

dataset:
  train:
    path: /content/drive/MyDrive/musicgen_data/train_manifest.jsonl
    audio_path_key: path        
  valid:
    path: /content/drive/MyDrive/musicgen_data/valid_manifest.jsonl
    audio_path_key: path

optim:
  epochs: 1
  updates_per_epoch: 3000       
  lr: 1e-5
  optimizer: adamw
  max_norm: 1.0                 

checkpoint:
  save_every: 500               
  keep_last: 3                  
  folder: /content/drive/MyDrive/musicgen_checkpoints/

generate:
  every: 500                    
  num_samples: 2                
  duration: 10                  
  prompts:
    - "A calm acoustic guitar melody with soft percussion"
    - "Energetic electronic beat with synth lead"

logging:
  log_tensorboard: false
  log_wandb: true
  wandb:
    project: musicgen-hw4
    name: small_structured_metadata